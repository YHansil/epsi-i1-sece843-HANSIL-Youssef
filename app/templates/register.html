{% extends "base.html" %}
{% block title_extra %} - Inscription{% endblock %}

{% block content %}
<div class="card">
    <h2>Creer un compte</h2>
    <form method="POST" action="{{ url_for('register') }}" autocomplete="off">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username"
                   value="{{ username | default('', true) }}"
                   placeholder="Minimum 3 caracteres"
                   required minlength="3" maxlength="50"
                   autocomplete="off">
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password"
                   placeholder="Min 20 car. (3 min, 3 maj, 3 chiffres, 3 speciaux)"
                   required minlength="20"
                   autocomplete="new-password">
            <small class="password-hint">
                20 caracteres minimum : au moins 3 minuscules, 3 majuscules,
                3 chiffres et 3 caracteres speciaux
            </small>
        </div>

        <div class="form-group">
            <label for="password_confirm">Confirmer le mot de passe</label>
            <input type="password" id="password_confirm" name="password_confirm"
                   placeholder="Retapez votre mot de passe"
                   required minlength="20"
                   autocomplete="new-password">
        </div>

        <div class="form-group captcha-group">
            <label>CAPTCHA &mdash; Recopiez le texte de l'image :</label>
            <div class="captcha-container">
                <img src="data:image/png;base64,{{ captcha_img }}"
                     alt="CAPTCHA" class="captcha-image">
            </div>
            <input type="text" id="captcha" name="captcha"
                   placeholder="Entrez les 5 caracteres"
                   required maxlength="10"
                   autocomplete="off"
                   style="text-transform: uppercase;">
        </div>

        <button type="submit" class="btn btn-primary">
            Creer mon compte
        </button>
    </form>

    <div class="form-footer">
        <p>Deja un compte ?
            <a href="{{ url_for('login') }}">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
